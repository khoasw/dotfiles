set-option -g prefix C-s
bind-key C-s send-prefix
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",tmux-256color:RGB"
set-option -g status-position bottom
set-option -g status-left-length 128
set-option -g remain-on-exit off
set-option -g set-titles on
set-option -g renumber-windows on
set-option -g mouse on
set-option -g visual-activity on
set-option -g focus-events on
set-option -g status-interval 5
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},▸,}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},▸,}"
set-option -sg repeat-time 500
set-option -sg escape-time 10
set-option -sg history-limit 100000
set-option -sg set-clipboard on
set-window-option -g xterm-keys on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe
bind-key -n C-Space command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key h command-prompt -p "help for:" "run-shell -b 'man %1 || %1 --help || %1 help'"
bind-key l switch-client -l
bind-key -r C-n next-window
bind-key -r C-p previous-window
bind-key -r C-k select-pane -U
bind-key -r C-j select-pane -D
bind-key -r C-h select-pane -L
bind-key -r C-l select-pane -R
bind-key -r Up resize-pane -U 5
bind-key -r Down resize-pane -D 5
bind-key -r Left resize-pane -L 5
bind-key -r Right resize-pane -R 5
bind-key r source-file ~/.tmux.conf
unbind C-b
