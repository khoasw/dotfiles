set-option -g prefix C-s
bind-key C-s send-prefix
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g status-left-length 128
set-option -g set-titles on
set-option -g renumber-windows on
set-option -g visual-activity on
set-option -g extended-keys on
set-option -g mouse on
set-option -g focus-events on
set-option -g status-interval 1
set-option -g status-right "#{?client_prefix,^s ,}%a %d %b %H:%M"
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-style "bold,reverse"
set-option -sg history-limit 100000
set-option -wg mode-keys vi
bind-key -n M-[ copy-mode
bind-key -n M-] paste-buffer -p
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe
bind-key -n M-Space command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key -n M-m command-prompt -p "help for:" "run-shell -b 'man %1 || %1 --help || %1 help'"
bind-key x run-shell "tmux list-panes -s -F '##{pane_id}' | xargs -I{} tmux send-keys -t {} C-c"
bind-key r run-shell "tmux list-panes -s -F '##{pane_id}' | xargs -I{} tmux send-keys -t {} Up Enter"
bind-key -n M-x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key -n M-c new-window
bind-key -n M-- switch-client -l
bind-key -n M-w choose-tree -Zs
bind-key -n M-p previous-window
bind-key -n M-n next-window
bind-key -n M-v split-window -h
bind-key -n M-s split-window -v
bind-key -n M-: command-prompt
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-z resize-pane -Z
bind-key -n M-0 select-window -t :0
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-< swap-window -d -t -1
bind-key -n M-> swap-window -d -t +1
bind-key -n M-r source-file ~/.tmux.conf
