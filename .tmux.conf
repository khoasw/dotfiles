set-option -g prefix C-a
bind-key C-a send-prefix
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g renumber-windows on
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-titles on
set-option -g status-interval 1
set-option -g status-left-length 128
set-option -g mouse on
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-style "bold,reverse"
set-option -g status-right "#{?client_prefix,^a ,}%a %d %b %H:%M"
set-option -sg history-limit 100000
set-option -wg mode-keys vi
bind-key -n C-Space copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe
bind-key -n C-f command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key h command-prompt -p "help for:" "run-shell 'man \"%1\" 2>/dev/null || \"%1\" --help 2>&1'"
bind-key -n C-b switch-client -l
bind-key -r C-n next-window
bind-key -r C-p previous-window
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
bind-key r source-file ~/.tmux.conf
